<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SeriesTracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <span class="logo">SeriesTracker</span>
    </div>
    <div class="header-right">
      <input type="text" id="search" placeholder="Buscar series..." />
      <button id="btn-add" class="btn-primary">+ Agregar</button>
      <button id="btn-csv" class="btn-secondary">⬇ CSV</button>
    </div>
  </header>

  <main>
    <div class="controls">
      <div class="sort-controls">
        <label>Ordenar por:</label>
        <select id="sort">
          <option value="id">ID</option>
          <option value="name">Nombre</option>
          <option value="current_episode">Episodio actual</option>
          <option value="total_episodes">Total episodios</option>
        </select>
        <select id="order">
          <option value="asc">Ascendente</option>
          <option value="desc">Descendente</option>
        </select>
        <label>Por página:</label>
        <select id="limit">
          <option value="24">24</option>
          <option value="48">48</option>
          <option value="72">72</option>
        </select>
      </div>
      <span id="total-label"></span>
    </div>

    <div id="grid" class="grid"></div>

    <div class="pagination">
      <button id="btn-prev">← Anterior</button>
      <span id="page-label">Página 1</span>
      <button id="btn-next">Siguiente →</button>
    </div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modal-title">Agregar Serie</h2>
      <input type="hidden" id="form-id" />
      <label>Nombre</label>
      <input type="text" id="form-name" placeholder="Ej: Breaking Bad" />
      <label>Episodio actual</label>
      <input type="number" id="form-current" min="0" value="0" />
      <label>Total de episodios</label>
      <input type="number" id="form-total" min="1" value="1" />
      <label>URL de imagen (poster)</label>
      <input type="text" id="form-image" placeholder="https://..." />
      <div class="modal-actions">
        <button id="btn-cancel" class="btn-secondary">Cancelar</button>
        <button id="btn-save" class="btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
